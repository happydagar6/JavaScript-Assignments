<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Application With CRUD Operations (Only pure JS no react)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <h2>Shopping Cart Application With CRUD Operations</h2>
        <div class="form-container">
            <input type="text" id="itemName" placeholder="Item Name">
            <input type="number" id="itemPrice" placeholder="Item Price">
            <input type="number" id="itemQuantity" placeholder="Item Quantity">
            <button id="addItemBtn">Add Item</button>
        </div>

        <div class="cart-container">
            <h3>Shopping Cart</h3>
            <ul id="cartItems"></ul>
        </div>

        <div class="total-container">
            <h3>Total: $<span id="totalAmount">0.00</span></h3>
        </div>
    </div>


<script src="ShoppingCart.js"></script>
</body>
</html>
